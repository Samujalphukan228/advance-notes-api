<html>
  <head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }

      :root {
        --bg: #000;
        --fg: #fff;
        --gray1: #111;
        --gray2: #222;
        --gray3: #333;
        --gray4: #666;
        --gray5: #888;
        --gray6: #999;
        --radius: 6px;
      }

      body {
        font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        color: var(--fg);
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
        
      }


      /* Body */
body {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

body::-webkit-scrollbar {
  display: none;
}

/* Content area */
.content {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

.content::-webkit-scrollbar {
  display: none;
}

/* Sidebar */
aside {
  -ms-overflow-style: none;
  scrollbar-width: none;
}

aside::-webkit-scrollbar {
  display: none;
}
      /* Header */
      header {
        height: 48px;
        border-bottom: 1px solid var(--gray2);
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 16px;
        position: sticky;
        top: 0;
        background: var(--bg);
        z-index: 10;
      }

      .header-left {
        display: flex;
        align-items: center;
        gap: 16px;
      }

      .menu-toggle {
        display: none;
        width: 32px;
        height: 32px;
        padding: 0;
        border: none;
        background: transparent;
        color: var(--fg);
        cursor: pointer;
        align-items: center;
        justify-content: center;
      }

      .menu-toggle svg {
        width: 20px;
        height: 20px;
      }

      .logo {
        font-weight: 600;
        font-size: 14px;
      }

      .tabs {
        display: flex;
        gap: 4px;
      }

      .tab {
        padding: 6px 12px;
        color: var(--gray5);
        text-decoration: none;
        border-radius: var(--radius);
        font-size: 14px;
        transition: all 0.2s;
      }

      .tab:hover {
        color: var(--fg);
      }

      .tab.active {
        color: var(--fg);
        background: var(--gray1);
      }

      button {
        font-family: inherit;
        font-size: 14px;
        font-weight: 500;
        padding: 6px 12px;
        border-radius: var(--radius);
        border: 1px solid var(--gray2);
        background: transparent;
        color: var(--gray5);
        cursor: pointer;
        transition: all 0.2s;
        display: inline-flex;
        align-items: center;
        gap: 6px;
      }

      button:hover {
        color: var(--fg);
        border-color: var(--gray3);
      }

      /* Layout */
      .container {
        display: flex;
        height: calc(100vh - 48px);
        position: relative;
      }

      /* Sidebar */
      aside {
        width: 240px;
        border-right: 1px solid var(--gray2);
        overflow-y: auto;
        transition: transform 0.3s ease;
        background: var(--bg);
        flex-shrink: 0;
      }

      aside::-webkit-scrollbar {
        width: 0;
      }

      .sidebar-section {
        padding: 16px 0;
        border-bottom: 1px solid var(--gray2);
      }

      .sidebar-header {
        padding: 0 16px 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        color: var(--gray4);
      }

      /* Quick Filters */
      .quick-filters {
        padding: 0 16px;
      }

      .filter-btn {
        width: 100%;
        padding: 6px 12px;
        margin-bottom: 6px;
        text-align: left;
        font-size: 13px;
        color: var(--gray5);
        background: transparent;
        border: 1px solid transparent;
        border-radius: var(--radius);
        cursor: pointer;
        transition: all 0.15s;
        text-decoration: none;
        display: block;
      }

      .filter-btn:hover {
        color: var(--fg);
        background: var(--gray1);
      }

      .filter-btn.active {
        color: var(--fg);
        background: var(--gray1);
        border-color: var(--gray2);
      }

      /* Sidebar Overlay for Mobile */
      .sidebar-overlay {
        display: none;
        position: fixed;
        inset: 0;
        background: rgba(0,0,0,0.5);
        z-index: 8;
      }

      .sidebar-overlay.show {
        display: block;
      }

      /* Main */
      main {
        flex: 1;
        display: flex;
        flex-direction: column;
        overflow: hidden;
        min-width: 0;
      }

      /* Toolbar */
      .toolbar {
        padding: 12px 16px;
        border-bottom: 1px solid var(--gray2);
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .toolbar-title {
        font-size: 13px;
        font-weight: 500;
        color: var(--gray5);
      }

      .toolbar-info {
        font-size: 12px;
        color: var(--gray4);
      }

      /* Content */
      .content {
        flex: 1;
        overflow-y: auto;
        padding: 16px;
      }

      .content::-webkit-scrollbar {
        width: 8px;
      }

      .content::-webkit-scrollbar-thumb {
        background: var(--gray2);
        border-radius: 4px;
      }

      /* Notes Grid */
      .notes-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 12px;
      }

      .note-card {
        padding: 16px;
        background: var(--gray1);
        border: 1px solid var(--gray2);
        border-radius: var(--radius);
        transition: all 0.2s;
        cursor: pointer;
        position: relative;
      }

      .note-card:hover {
        border-color: var(--gray3);
      }

      .note-title {
        font-weight: 500;
        margin-bottom: 8px;
        color: var(--fg);
        text-decoration: none;
        display: block;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .note-content {
        font-size: 13px;
        color: var(--gray5);
        line-height: 1.5;
        display: -webkit-box;
        -webkit-line-clamp: 2;
        -webkit-box-orient: vertical;
        overflow: hidden;
        margin-bottom: 12px;
      }

      .note-footer {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 12px;
        color: var(--gray4);
        flex-wrap: wrap;
      }

      .note-actions {
        position: absolute;
        top: 8px;
        right: 8px;
        display: none;
        gap: 4px;
      }

      .note-card:hover .note-actions {
        display: flex;
      }

      .note-actions button {
        width: 28px;
        height: 28px;
        padding: 0;
        background: var(--bg);
        justify-content: center;
      }

      .note-meta {
        display: inline-flex;
        padding: 2px 6px;
        font-size: 11px;
        border: 1px solid var(--gray2);
        border-radius: 4px;
        color: var(--gray5);
      }

      .empty {
        text-align: center;
        padding: 64px 24px;
        color: var(--gray4);
      }

      .empty-icon {
        font-size: 48px;
        margin-bottom: 16px;
        opacity: 0.5;
      }

      .empty-title {
        font-size: 16px;
        font-weight: 500;
        margin-bottom: 8px;
        color: var(--gray5);
      }

      .empty-text {
        font-size: 14px;
        color: var(--gray4);
      }

      /* Mobile Styles */
      @media (max-width: 768px) {
        .menu-toggle {
          display: flex;
        }

        .tabs {
          display: none;
        }

        aside {
          position: fixed;
          top: 48px;
          left: 0;
          bottom: 0;
          width: 280px;
          transform: translateX(-100%);
          z-index: 9;
        }

        aside.open {
          transform: translateX(0);
        }

        .header-right button span {
          display: none;
        }

        .notes-grid {
          grid-template-columns: 1fr;
        }

        .content {
          padding: 12px;
        }

        .toolbar {
          padding: 12px;
        }
      }

      /* Toast */
      .toast {
        position: fixed;
        bottom: 24px;
        left: 50%;
        transform: translate(-50%, 100px);
        padding: 12px 16px;
        background: var(--gray1);
        border: 1px solid var(--gray2);
        border-radius: var(--radius);
        color: var(--fg);
        font-size: 14px;
        opacity: 0;
        transition: all 0.3s;
        z-index: 200;
      }

      .toast.show {
        transform: translate(-50%, 0);
        opacity: 1;
      }
    </style>
  </head>

  <body>
    <header>
      <div class="header-left">
        <button class="menu-toggle" onclick="toggleSidebar()">
          <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16"/>
          </svg>
        </button>
        <div class="logo">Notes</div>
        <nav class="tabs">
          <a href="dashboard.html" class="tab">All</a>
          <a href="archive.html" class="tab active">Archive</a>
          <a href="trash.html" class="tab">Trash</a>
        </nav>
      </div>
      <div class="header-right">
        <button onclick="logout()"><span>Logout</span></button>
      </div>
    </header>

    <div class="container">
      <!-- Sidebar Overlay -->
      <div class="sidebar-overlay" onclick="closeSidebar()"></div>

      <!-- Sidebar -->
      <aside id="sidebar">
        <!-- Navigation -->
        <div class="sidebar-section">
          <div class="sidebar-header">
            <span>Navigation</span>
          </div>
          <div class="quick-filters">
            <a href="dashboard.html" class="filter-btn">All Notes</a>
            <a href="archive.html" class="filter-btn active">Archive</a>
            <a href="trash.html" class="filter-btn">Trash</a>
          </div>
        </div>

        <!-- Actions -->
        <div class="sidebar-section">
          <div class="sidebar-header">
            <span>Actions</span>
          </div>
          <div class="quick-filters">
            <button class="filter-btn" onclick="logout()">Logout</button>
          </div>
        </div>
      </aside>

      <main>
        <!-- Toolbar -->
        <div class="toolbar">
          <div class="toolbar-title">📦 Archived Notes</div>
          <div class="toolbar-info" id="noteCount"></div>
        </div>

        <!-- Content -->
        <div class="content">
          <div id="notes" class="notes-grid"></div>
        </div>
      </main>
    </div>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>
    <script>
      loadArchive();

      // --- MOBILE SIDEBAR ---
      function toggleSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.querySelector('.sidebar-overlay');
        sidebar.classList.toggle('open');
        overlay.classList.toggle('show');
      }

      function closeSidebar() {
        const sidebar = document.getElementById('sidebar');
        const overlay = document.querySelector('.sidebar-overlay');
        sidebar.classList.remove('open');
        overlay.classList.remove('show');
      }

      async function loadArchive() {
        const all = await apiFetch("/notes?limit=999");
        const notes = all.filter(n => n.isArchived);

        const div = document.getElementById("notes");
        const countEl = document.getElementById("noteCount");
        
        countEl.textContent = `${notes.length} note${notes.length !== 1 ? 's' : ''}`;
        div.innerHTML = "";

        if (notes.length === 0) {
          div.innerHTML = `
            <div class="empty">
              <div class="empty-icon">📦</div>
              <div class="empty-title">No archived notes</div>
              <div class="empty-text">Notes you archive will appear here</div>
            </div>
          `;
          return;
        }

        notes.forEach(n => {
          const preview = n.content ? n.content.substring(0, 100) : "No content";
          const date = new Date(n.updatedAt).toLocaleDateString();

          div.innerHTML += `
            <div class="note-card" onclick="window.location='note.html?id=${n._id}'">
              <div class="note-actions">
                <button onclick="event.stopPropagation(); unarchive('${n._id}')" title="Unarchive">📂</button>
                <button onclick="event.stopPropagation(); deleteNote('${n._id}')" title="Delete">🗑</button>
              </div>
              <div class="note-title">${n.title}</div>
              <div class="note-content">${preview}</div>
              <div class="note-footer">
                <span class="note-meta">${date}</span>
                <span class="note-meta">Archived</span>
              </div>
            </div>
          `;
        });
      }

      async function unarchive(id) {
        await apiFetch(`/notes/${id}/unarchive`, { method: "PATCH" });
        showToast("Note unarchived");
        loadArchive();
      }

      async function deleteNote(id) {
        await apiFetch(`/notes/${id}`, { method: "DELETE" });
        showToast("Moved to trash");
        loadArchive();
      }

      function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      // Escape to close sidebar
      document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
          closeSidebar();
        }
      });

      async function logout() {
        await apiFetch("/auth/logout", { method: "POST" });
        window.location = "index.html";
      }
    </script>
  </body>
</html>
