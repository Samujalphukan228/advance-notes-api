<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #000;
        color: #fff;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
        -webkit-font-smoothing: antialiased;
      }

      .container {
        width: 100%;
        max-width: 340px;
      }

      h1 {
        font-size: 1.5rem;
        font-weight: 600;
        text-align: center;
        margin-bottom: 2rem;
        color: #fff;
      }

      input {
        width: 100%;
        padding: 0.75rem 0.875rem;
        margin-bottom: 0.75rem;
        font-family: inherit;
        font-size: 0.875rem;
        color: #fff;
        background: #000;
        border: 1px solid #333;
        border-radius: 5px;
        outline: none;
        transition: all 0.15s ease;
      }

      input::placeholder {
        color: #666;
      }

      input:hover {
        border-color: #555;
      }

      input:focus {
        border-color: #fff;
      }

      button {
        width: 100%;
        padding: 0.75rem;
        margin-top: 0.5rem;
        font-family: inherit;
        font-size: 0.875rem;
        font-weight: 500;
        color: #000;
        background: #fff;
        border: 1px solid #fff;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      button:hover {
        background: #e6e6e6;
        border-color: #e6e6e6;
      }

      button:active {
        transform: scale(0.98);
      }

      .divider {
        display: flex;
        align-items: center;
        text-align: center;
        margin: 1.5rem 0;
        color: #666;
        font-size: 0.75rem;
      }

      .divider::before,
      .divider::after {
        content: "";
        flex: 1;
        border-bottom: 1px solid #333;
      }

      .divider span {
        padding: 0 1rem;
      }

      .link-container {
        text-align: center;
        margin-top: 1.5rem;
      }

      .link-container p {
        font-size: 0.875rem;
        color: #666;
      }

      .link-container a {
        color: #fff;
        text-decoration: none;
        font-weight: 500;
        transition: color 0.15s ease;
      }

      .link-container a:hover {
        color: #e6e6e6;
      }

      @media (max-width: 480px) {
        h1 {
          font-size: 1.375rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h1>Register</h1>

      <input id="name" placeholder="Name" />

      <input id="email" placeholder="Email" type="email" />

      <input id="password" placeholder="Password" type="password" />

      <button onclick="register()">Register</button>

      <div class="divider">
        <span>or</span>
      </div>

      <div class="link-container">
        <p>Already have an account? <a href="/frontend/index.html">Login</a></p>
      </div>
    </div>

    <script src="app.js"></script>

    <script>
      async function register() {
        const name = document.getElementById("name").value;

        const email = document.getElementById("email").value;

        const password = document.getElementById("password").value;

        await apiFetch("/auth/register", {
          method: "POST",

          body: JSON.stringify({
            name,
            email,
            password,
          }),
        });

        window.location = "dashboard.html";
      }
    </script>
  </body>
</html>
