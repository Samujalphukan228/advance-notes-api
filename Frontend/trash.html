<html>
  <head>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          -apple-system,
          BlinkMacSystemFont,
          sans-serif;
        background: #000;
        color: #fff;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
      }

      .navbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 1rem 2rem;
        border-bottom: 1px solid #333;
        position: sticky;
        top: 0;
        background: rgba(0, 0, 0, 0.95);
        backdrop-filter: blur(10px);
        z-index: 5;
      }

      .navbar-left {
        display: flex;
        align-items: center;
        gap: 1.5rem;
      }
      .navbar h1 {
        font-size: 1rem;
        font-weight: 600;
      }

      .nav-links {
        display: flex;
        gap: 0.25rem;
      }

      .nav-link {
        padding: 0.375rem 0.75rem;
        font-family: inherit;
        font-size: 0.8125rem;
        font-weight: 500;
        color: #666;
        background: transparent;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        text-decoration: none;
        transition: all 0.15s ease;
      }

      .nav-link:hover {
        color: #fff;
        background: #111;
      }
      .nav-link.active {
        color: #fff;
        background: #222;
      }

      .navbar-actions {
        display: flex;
        gap: 0.75rem;
      }

      .btn-secondary {
        padding: 0.5rem 1rem;
        font-family: inherit;
        font-size: 0.8125rem;
        font-weight: 500;
        color: #fff;
        background: transparent;
        border: 1px solid #333;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .btn-secondary:hover {
        border-color: #555;
        background: #111;
      }

      .btn-icon {
        padding: 0.375rem 0.5rem;
        font-size: 0.8125rem;
        color: #666;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .btn-icon:hover {
        color: #fff;
        background: #111;
        border-color: #333;
      }

      .btn-danger-text {
        padding: 0.375rem 0.5rem;
        font-family: inherit;
        font-size: 0.8125rem;
        color: #dc2626;
        background: transparent;
        border: 1px solid transparent;
        border-radius: 5px;
        cursor: pointer;
        transition: all 0.15s ease;
      }

      .btn-danger-text:hover {
        background: #1a0000;
        border-color: #dc2626;
      }

      .content {
        max-width: 900px;
        margin: 0 auto;
        padding: 1.5rem 2rem;
      }

      .trash-info {
        display: flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.75rem 1rem;
        background: #111;
        border: 1px solid #333;
        border-radius: 5px;
        margin-bottom: 1.5rem;
        font-size: 0.8125rem;
        color: #999;
      }

      .empty-state {
        text-align: center;
        padding: 4rem 1rem;
        color: #666;
        font-size: 0.875rem;
      }

      .notes-list {
        display: flex;
        flex-direction: column;
        gap: 0.5rem;
      }

      .note {
        padding: 1rem;
        border: 1px solid #333;
        border-radius: 5px;
        transition: all 0.15s ease;
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
      }

      .note:hover {
        border-color: #555;
        background: #111;
      }
      .note-info {
        flex: 1;
        min-width: 0;
      }

      .note-title {
        font-size: 0.875rem;
        font-weight: 500;
        color: #999;
      }

      .note-preview {
        color: #555;
        font-size: 0.8125rem;
        margin-top: 0.25rem;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .note-date {
        font-size: 0.75rem;
        color: #444;
        margin-top: 0.375rem;
      }
      .note-actions {
        display: flex;
        gap: 0.25rem;
        flex-shrink: 0;
      }

      .toast {
        position: fixed;
        bottom: 2rem;
        right: 2rem;
        padding: 0.75rem 1.25rem;
        background: #fff;
        color: #000;
        font-size: 0.8125rem;
        font-weight: 500;
        border-radius: 5px;
        transform: translateY(100px);
        opacity: 0;
        transition: all 0.3s ease;
        z-index: 20;
      }

      .toast.show {
        transform: translateY(0);
        opacity: 1;
      }

      @media (max-width: 640px) {
        .navbar {
          padding: 1rem;
          flex-wrap: wrap;
          gap: 0.75rem;
        }
        .content {
          padding: 1rem;
        }
      }
    </style>
  </head>

  <body>
    <div class="navbar">
      <div class="navbar-left">
        <h1>Notes</h1>
        <div class="nav-links">
          <a href="dashboard.html" class="nav-link">All Notes</a>
          <a href="archive.html" class="nav-link">Archive</a>
          <a href="trash.html" class="nav-link active">Trash</a>
        </div>
      </div>
      <div class="navbar-actions">
        <button class="btn-secondary" onclick="logout()">Logout</button>
      </div>
    </div>

    <div class="content">
      <div class="trash-info">
        ⚠️ Notes in trash will stay here until permanently deleted.
      </div>
      <div id="notes" class="notes-list"></div>
    </div>

    <div class="toast" id="toast"></div>

    <script src="app.js"></script>

    <script>
      loadTrash();

      async function loadTrash() {
        const notes = await apiFetch("/notes/trash");
        const div = document.getElementById("notes");
        div.innerHTML = "";

        if (notes.length === 0) {
          div.innerHTML = '<div class="empty-state">Trash is empty.</div>';
          return;
        }

        notes.forEach((n) => {
          const preview = n.content ? n.content.substring(0, 80) : "No content";
          const date = new Date(n.updatedAt).toLocaleDateString();

          div.innerHTML += `
            <div class="note">
              <div class="note-info">
                <div class="note-title">${n.title}</div>
                <div class="note-preview">${preview}</div>
                <div class="note-date">Deleted ${date}</div>
              </div>
              <div class="note-actions">
                <button class="btn-icon" onclick="restoreNote('${n._id}')" title="Restore">♻️</button>
                <button class="btn-danger-text" onclick="permanentDelete('${n._id}')" title="Delete forever">🗑️</button>
              </div>
            </div>
          `;
        });
      }

      async function restoreNote(id) {
        await apiFetch(`/notes/${id}/restore`, { method: "POST" });
        showToast("Note restored");
        loadTrash();
      }

      async function permanentDelete(id) {
        if (!confirm("Permanently delete this note? This cannot be undone."))
          return;
        await apiFetch(`/notes/${id}/permanent`, { method: "DELETE" });
        showToast("Note permanently deleted");
        loadTrash();
      }

      function showToast(msg) {
        const toast = document.getElementById("toast");
        toast.textContent = msg;
        toast.classList.add("show");
        setTimeout(() => toast.classList.remove("show"), 2000);
      }

      async function logout() {
        await apiFetch("/auth/logout", { method: "POST" });
        window.location = "index.html";
      }
    </script>
  </body>
</html>
